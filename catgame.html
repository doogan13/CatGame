<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;font-family:Arial,sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#wrap{position:relative;transform-origin:top left;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;white-space:nowrap;}
.pill{background:rgba(0,0,0,0.35);color:#fff;border-radius:20px;padding:5px 18px;font-size:13px;white-space:nowrap;}
#msg{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.45);color:#fff;border-radius:20px;padding:6px 24px;font-size:13px;white-space:nowrap;}
#boostbar{position:absolute;top:10px;left:12px;display:flex;gap:6px;}
.bp{width:22px;height:22px;border-radius:5px;background:rgba(127,100,220,0.2);}
.bp.on{background:#8870EE;}
#zonetag{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.35);color:#fff;border-radius:20px;padding:3px 16px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.6s;}
#done-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.6);display:none;flex-direction:column;align-items:center;gap:14px;pointer-events:all;z-index:15;opacity:0;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.25s ease;}
#done-btn.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#done-dist{background:rgba(0,0,0,0.75);color:#FFD700;border-radius:16px;padding:10px 30px;font-size:22px;font-weight:700;white-space:nowrap;}
.done-row{display:flex;gap:12px;}
.done-action{border:2.5px solid #0a2a4a;border-radius:36px;padding:15px 33px;font-size:19px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial,sans-serif;transition:filter 0.12s,transform 0.1s;}
.done-action:hover{filter:brightness(1.25);}
.done-action:active{transform:scale(0.95);}
#done-relaunch{background:#1a0e33;color:#C8AAFF;}
#done-swapcat{background:#0a1e2e;color:#80D0FF;}
#done-shop-btn{background:#1a1400;color:#FFD700;font-size:16px;padding:11px 25px;}
#sel{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;pointer-events:all;z-index:20;}
#sel h2{font-size:24px;margin:0;color:#222;font-weight:700;}
#sel p{margin:0;color:#666;font-size:15px;}
.crow{display:flex;gap:24px;justify-content:center;}
.ccard{border:2.5px solid #ccc;border-radius:14px;padding:18px 28px;cursor:pointer;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:150px;}
.ccard canvas{display:block;margin:0 auto;}
.ccard:hover{border-color:#8870EE;background:#f0eeff;}
.ccard b{font-size:16px;color:#222;text-align:center;display:block;}
.ccard span{font-size:13px;color:#888;text-align:center;display:block;}
#shop{position:absolute;inset:0;background:rgba(14,8,30,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:all;z-index:20;}
#shop h2{font-size:26px;font-weight:700;color:#fff;margin:0;}
#scoin{font-size:17px;color:#FFD700;font-weight:600;}
.ugrid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:580px;}
.ucard{border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;padding:14px 18px;cursor:pointer;min-width:130px;text-align:center;background:rgba(255,255,255,0.07);}
.ucard:hover{border-color:#FFD700;background:rgba(255,255,255,0.14);}
.ucard .un{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}
.ucard .ud{font-size:12px;color:rgba(255,255,255,0.55);margin:0 0 8px;}
.ucard .uv{font-size:14px;color:#FFD700;font-weight:600;}
.ucard .ulv{font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;}
.ucard.affordable{border-color:rgba(255,215,0,0.6);}
.ucard.maxed{border-color:rgba(100,255,120,0.4);cursor:default;}
.ucard.maxed .uv{color:#80FF90;}
#goBtn{background:#8870EE;border:none;color:#fff;font-size:18px;font-weight:700;border-radius:12px;padding:14px 48px;cursor:pointer;font-family:Arial,sans-serif;}
#goBtn:hover{background:#AA99FF;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="boostbar"></div>
    <div id="hud">
      <div class="pill">coins: <b id="hc">0</b></div>
      <div class="pill">best: <b id="hb">0 ft</b></div>
      <div class="pill"><b id="hd">0 ft</b></div>
      <div class="pill" id="spd-pill" style="display:none">⚡ <b id="hspd">0</b> mph</div>
    </div>
    <div id="zonetag"></div>
    <div id="msg">Pick Your Cat!</div>
  </div>
  <div id="done-btn">
    <div id="done-dist">0 ft</div>
    <div class="done-row">
      <button class="done-action" id="done-relaunch">🚀 Relaunch!</button>
      <button class="done-action" id="done-swapcat">🐱 Swap Cat</button>
    </div>
    <button class="done-action" id="done-shop-btn">Open Shop</button>
  </div>
  <div id="sel" style="display:flex;">
    <h2 id="sel-title">Choose Your Cat</h2>
    <p>They Fly Very Differently</p>
    <div class="crow">
      <div class="ccard" id="btnTT">
        <canvas id="pvTT" width="120" height="120"></canvas>
        <b>Tater Tot</b><span>Large · Powerful</span>
      </div>
      <div class="ccard" id="btnHF">
        <canvas id="pvHF" width="120" height="120"></canvas>
        <b>Home Fry</b><span>Small · Floaty · Fast</span>
      </div>
    </div>
  </div>
  <div id="shop">
    <h2>Upgrade Shop</h2>
    <div id="scoin">Coins: 0</div>
    <div class="ugrid" id="ugrid"></div>
    <button id="goBtn">Launch!</button>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ct=cv.getContext('2d');
const GAME_W=680,GAME_H=520;
cv.width=GAME_W;cv.height=GAME_H;
const wrap=document.getElementById('wrap');
function scaleToWindow(){
  const scale=Math.min(window.innerWidth/GAME_W,window.innerHeight/GAME_H);
  wrap.style.width=GAME_W+'px';
  wrap.style.height=GAME_H+'px';
  wrap.style.transform=`scale(${scale})`;
  wrap.style.marginLeft=Math.round((window.innerWidth-GAME_W*scale)/2/scale)+'px';
  wrap.style.marginTop=Math.round((window.innerHeight-GAME_H*scale)/2/scale)+'px';
}
scaleToWindow();
window.addEventListener('resize',scaleToWindow);
const W=GAME_W,H=GAME_H,FL=H-60;
let catType='orange',state='select';
let coins=0,best=0,runDist=0;
let px=0,py=0,pvx=0,pvy=0,camX=0,smoothCamX=0;
let onGround=false,blinkT=0,boostLeft=0,boostFlash=0;
let items=[],sparks=[],trails=[],raf=null,displaySpeed=0,selMode='initial';
let phase='angle',rampAngle=0.32,rampDir=1;
const RAMP_SPEED=0.007,RAMP_MIN=0.12,RAMP_MAX=0.72;
let powVal=0,powDir=1;
const POW_SPEED=0.022;
let sledT=0,sledV=0,currentZone=0,zoneTagTimer=0;
const zoneTag=document.getElementById('zonetag'),doneBtn=document.getElementById('done-btn'),doneDist=document.getElementById('done-dist'),selEl=document.getElementById('sel');
const ZONES=[
  {ft:0,name:'Backyard',sky:'#87CEEB',hor:'#A8D8F8',gnd:'#5BB030',type:'meadow'},
  {ft:500,name:'Countryside',sky:'#70C0E0',hor:'#A0D4F4',gnd:'#4AA828',type:'meadow'},
  {ft:1000,name:'Desert',sky:'#E8B840',hor:'#F0D070',gnd:'#C8A040',type:'desert'},
  {ft:1500,name:'Arctic',sky:'#C8E4F8',hor:'#E0F4FF',gnd:'#D8EEF8',type:'arctic'},
  {ft:2000,name:'Night Sky',sky:'#0C1428',hor:'#182040',gnd:'#182840',type:'night'},
  {ft:3000,name:'Storm',sky:'#3C4450',hor:'#485058',gnd:'#384040',type:'storm'},
  {ft:4000,name:'Space',sky:'#080812',hor:'#100820',gnd:'#181020',type:'space'},
  {ft:5000,name:'Deep Space',sky:'#040408',hor:'#080414',gnd:'#100C18',type:'space'},
];
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lerpColor(a,b,t){return{r:a.r+(b.r-a.r)*t,g:a.g+(b.g-a.g)*t,b:a.b+(b.b-a.b)*t};}
function rgbStr(c){return`rgb(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)})`;}
let curSky=hexToRgb('#87CEEB'),curGnd=hexToRgb('#5BB030'),curHor=hexToRgb('#A8D8F8');
function updateZoneColors(){const z=ZONES[currentZone];curSky=lerpColor(curSky,hexToRgb(z.sky),0.025);curGnd=lerpColor(curGnd,hexToRgb(z.gnd),0.025);curHor=lerpColor(curHor,hexToRgb(z.hor),0.025);}
let windX=0,windTarget=0;
function checkZone(){
  let z=0;for(let i=0;i<ZONES.length;i++){if(runDist>=ZONES[i].ft)z=i;}
  if(z!==currentZone){currentZone=z;zoneTag.textContent=ZONES[z].name;zoneTag.style.opacity='1';zoneTagTimer=140;if(['desert','storm','arctic'].includes(ZONES[z].type))windTarget=(Math.random()-0.5)*0.14;else windTarget=0;}
  if(zoneTagTimer>0){zoneTagTimer--;if(zoneTagTimer===0)zoneTag.style.opacity='0';}
  windX+=(windTarget-windX)*0.015;updateZoneColors();
}
const UPS=[
  {id:'pow',name:'Rocket Fuel',desc:'Bigger thrust',costs:[80,160,320,600],val:0,max:4},
  {id:'bnc',name:'Bounce',desc:'Keep more speed',costs:[60,130,280,500],val:0,max:4},
  {id:'bst',name:'Air Boosts',desc:'More boost charges',costs:[70,150,300],val:0,max:3},
  {id:'gli',name:'Aerodynamics',desc:'Less air resistance',costs:[100,220,420],val:0,max:3},
  {id:'mag',name:'Magnet',desc:'Attract coins',costs:[90,200],val:0,max:2},
];
const U=id=>UPS.find(u=>u.id===id);
const maxPow=()=>30+U('pow').val*10,bounceR=()=>0.36+U('bnc').val*0.11,boostMax=()=>2+U('bst').val,glide=()=>0.9984-U('gli').val*0.0006,magR=()=>30+U('mag').val*38,catR=()=>catType==='orange'?26:18;
const RAMP_BASE_X=60,RAMP_BASE_Y=FL,RAMP_LEN=200;
function getRampTip(){return{x:RAMP_BASE_X+Math.cos(-rampAngle)*RAMP_LEN,y:RAMP_BASE_Y+Math.sin(-rampAngle)*RAMP_LEN};}
function getSledPos(t){return{x:RAMP_BASE_X+Math.cos(-rampAngle)*RAMP_LEN*t,y:RAMP_BASE_Y+Math.sin(-rampAngle)*RAMP_LEN*t};}
function showDoneBtn(){doneDist.textContent=runDist+' ft'+(runDist>=best?' 🏆 New Best!':'');doneBtn.style.display='flex';requestAnimationFrame(()=>requestAnimationFrame(()=>doneBtn.classList.add('show')));}
function hideDoneBtn(){doneBtn.classList.remove('show');setTimeout(()=>{doneBtn.style.display='none';},350);}
document.getElementById('done-relaunch').addEventListener('click',()=>{hideDoneBtn();cancelAnimationFrame(raf);beginRun();});
document.getElementById('done-swapcat').addEventListener('click',()=>{hideDoneBtn();cancelAnimationFrame(raf);openCatSelect('swap');});
document.getElementById('done-shop-btn').addEventListener('click',()=>{hideDoneBtn();cancelAnimationFrame(raf);openShop();});
function openCatSelect(mode){selMode=mode;document.getElementById('sel-title').textContent=mode==='swap'?'Swap Your Cat':'Choose Your Cat';selEl.style.display='flex';state='select';}
function pickCat(type){catType=type;selEl.style.display='none';if(selMode==='swap')beginRun();else openShop();}
document.getElementById('btnTT').addEventListener('click',()=>pickCat('orange'));
document.getElementById('btnHF').addEventListener('click',()=>pickCat('gray'));
function drawOrange(c,x,y,sc,dir,bl){
  c.save();c.translate(x,y);c.scale(dir,1);const s=sc;
  c.strokeStyle='#C05010';c.lineWidth=s*8;c.lineCap='round';c.beginPath();c.moveTo(-s*16,s*6);c.bezierCurveTo(-s*48,s*4,-s*55,-s*26,-s*36,-s*40);c.stroke();
  c.strokeStyle='#F08040';c.lineWidth=s*5;c.beginPath();c.moveTo(-s*16,s*6);c.bezierCurveTo(-s*48,s*4,-s*55,-s*26,-s*36,-s*40);c.stroke();
  c.fillStyle='#F4914A';c.beginPath();c.ellipse(0,0,s*26,s*20,0,0,Math.PI*2);c.fill();
  c.fillStyle='#FAE0B0';c.beginPath();c.ellipse(s*5,s*5,s*15,s*12,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#C05010';c.lineWidth=s*2.5;c.lineCap='round';
  [[-s*12,-s*17,-s*9,s*11],[-s*2,-s*19,s*1,s*12],[s*9,-s*17,s*11,s*11]].forEach(([a,b,d,e])=>{c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();});
  c.fillStyle='#E07030';c.beginPath();c.ellipse(s*20,s*15,s*10,s*6,-0.3,0,Math.PI*2);c.fill();
  c.fillStyle='#FAE0B0';c.beginPath();c.ellipse(s*24,s*19,s*7,s*5,0,0,Math.PI*2);c.fill();
  c.fillStyle='#E07030';c.beginPath();c.ellipse(-s*18,s*16,s*9,s*6,0.3,0,Math.PI*2);c.fill();
  c.fillStyle='#FAE0B0';c.beginPath();c.ellipse(-s*18,s*22,s*6,s*4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#F4914A';c.beginPath();c.ellipse(s*20,-s*18,s*21,s*19,0,0,Math.PI*2);c.fill();
  c.fillStyle='#D06020';c.beginPath();c.moveTo(s*7,-s*29);c.lineTo(s*1,-s*50);c.lineTo(s*20,-s*36);c.closePath();c.fill();
  c.beginPath();c.moveTo(s*28,-s*29);c.lineTo(s*35,-s*50);c.lineTo(s*42,-s*34);c.closePath();c.fill();
  c.fillStyle='#F0A090';c.beginPath();c.moveTo(s*9,-s*31);c.lineTo(s*5,-s*44);c.lineTo(s*18,-s*37);c.closePath();c.fill();
  c.beginPath();c.moveTo(s*29,-s*31);c.lineTo(s*34,-s*44);c.lineTo(s*40,-s*35);c.closePath();c.fill();
  c.strokeStyle='#C05010';c.lineWidth=s*2;
  [[s*12,-s*6,s*12,-s*30],[s*20,-s*4,s*20,-s*32],[s*28,-s*6,s*28,-s*30]].forEach(([a,b,d,e])=>{c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();});
  c.strokeStyle='#C05010';c.lineWidth=s*1.8;c.beginPath();c.moveTo(s*12,-s*30);c.lineTo(s*16,-s*24);c.lineTo(s*20,-s*30);c.lineTo(s*24,-s*24);c.lineTo(s*28,-s*30);c.stroke();
  c.fillStyle='#FAE0C0';c.beginPath();c.ellipse(s*32,-s*14,s*10,s*8,0,0,Math.PI*2);c.fill();
  if(bl){c.strokeStyle='#5A2A08';c.lineWidth=s*2.5;c.lineCap='round';c.beginPath();c.moveTo(s*13,-s*20);c.lineTo(s*19,-s*20);c.stroke();c.beginPath();c.moveTo(s*24,-s*20);c.lineTo(s*30,-s*20);c.stroke();}
  else{c.fillStyle='#C8C020';c.beginPath();c.ellipse(s*16,-s*21,s*5,s*6,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*27,-s*21,s*5,s*6,0,0,Math.PI*2);c.fill();c.fillStyle='#1A0E04';c.beginPath();c.ellipse(s*16,-s*21,s*2,s*5,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(s*27,-s*21,s*2,s*5,0,0,Math.PI*2);c.fill();c.fillStyle='#fff';c.beginPath();c.arc(s*18,-s*24,s*1.8,0,Math.PI*2);c.fill();c.beginPath();c.arc(s*29,-s*24,s*1.8,0,Math.PI*2);c.fill();c.strokeStyle='#5A2A08';c.lineWidth=s*1;c.beginPath();c.ellipse(s*16,-s*21,s*5,s*6,0,0,Math.PI*2);c.stroke();c.beginPath();c.ellipse(s*27,-s*21,s*5,s*6,0,0,Math.PI*2);c.stroke();}
  c.fillStyle='#E05878';c.beginPath();c.moveTo(s*32,-s*18);c.lineTo(s*28,-s*12);c.lineTo(s*36,-s*12);c.closePath();c.fill();
  c.strokeStyle='#904040';c.lineWidth=s*1.5;c.lineCap='round';c.beginPath();c.moveTo(s*32,-s*12);c.quadraticCurveTo(s*26,-s*6,s*22,-s*8);c.stroke();c.beginPath();c.moveTo(s*32,-s*12);c.quadraticCurveTo(s*38,-s*6,s*42,-s*8);c.stroke();
  c.strokeStyle='rgba(255,255,255,0.8)';c.lineWidth=s*1.2;c.lineCap='round';
  [[-1,s*4],[-1,0],[1,s*4],[1,0]].forEach(([d,oy])=>{c.beginPath();c.moveTo(s*32+d*s*4,-s*13+oy);c.lineTo(s*32+d*s*20,-s*13+oy);c.stroke();});
  c.restore();
}
function drawGray(c,x,y,sc,dir,bl){
  c.save();c.translate(x,y);c.scale(dir,1);const s=sc;
  c.strokeStyle='#505470';c.lineWidth=s*6;c.lineCap='round';c.beginPath();c.moveTo(-s*12,s*5);c.bezierCurveTo(-s*38,s*2,-s*44,-s*20,-s*26,-s*32);c.stroke();
  c.strokeStyle='#9A9EB8';c.lineWidth=s*4;c.beginPath();c.moveTo(-s*12,s*5);c.bezierCurveTo(-s*38,s*2,-s*44,-s*20,-s*26,-s*32);c.stroke();
  c.fillStyle='#9A9EB8';c.beginPath();c.ellipse(0,0,s*19,s*15,0,0,Math.PI*2);c.fill();
  c.fillStyle='#D0D4E8';c.beginPath();c.ellipse(s*3,s*4,s*11,s*10,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#686C88';c.lineWidth=s*2;c.lineCap='round';
  [[-s*8,-s*12,-s*6,s*8],[-s*1,-s*13,s*0,s*9],[s*7,-s*12,s*7,s*8]].forEach(([a,b,d,e])=>{c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();});
  c.fillStyle='#8A8EA8';c.beginPath();c.ellipse(s*15,s*11,s*7,s*5,-0.3,0,Math.PI*2);c.fill();c.fillStyle='#D0D4E8';c.beginPath();c.ellipse(s*18,s*15,s*5,s*4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#8A8EA8';c.beginPath();c.ellipse(-s*13,s*12,s*7,s*5,0.3,0,Math.PI*2);c.fill();c.fillStyle='#D0D4E8';c.beginPath();c.ellipse(-s*13,s*17,s*5,s*4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#9A9EB8';c.beginPath();c.ellipse(s*15,-s*13,s*16,s*14,0,0,Math.PI*2);c.fill();
  c.fillStyle='#787C96';c.beginPath();c.moveTo(s*4,-s*21);c.lineTo(s*0,-s*37);c.lineTo(s*14,-s*25);c.closePath();c.fill();c.beginPath();c.moveTo(s*21,-s*21);c.lineTo(s*26,-s*37);c.lineTo(s*31,-s*24);c.closePath();c.fill();
  c.fillStyle='#E8A0B8';c.beginPath();c.moveTo(s*6,-s*23);c.lineTo(s*3,-s*33);c.lineTo(s*12,-s*26);c.closePath();c.fill();c.beginPath();c.moveTo(s*22,-s*23);c.lineTo(s*25,-s*33);c.lineTo(s*29,-s*25);c.closePath();c.fill();
  c.strokeStyle='#686C88';c.lineWidth=s*1.8;[[s*9,-s*4,s*9,-s*22],[s*15,-s*3,s*15,-s*23],[s*21,-s*4,s*21,-s*22]].forEach(([a,b,d,e])=>{c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();});
  c.strokeStyle='#686C88';c.lineWidth=s*1.6;c.beginPath();c.moveTo(s*9,-s*22);c.lineTo(s*12,-s*17);c.lineTo(s*15,-s*22);c.lineTo(s*18,-s*17);c.lineTo(s*21,-s*22);c.stroke();

    const bob=it.onGnd?0:Math.sin(itemT*0.003+it.bob)*5,sy=it.wy+bob;
    if(it.type==='coin'){ct.fillStyle='#FFD700';ct.beginPath();ct.arc(sx,sy,10,0,Math.PI*2);ct.fill();ct.strokeStyle='#A87800';ct.lineWidth=2;ct.stroke();ct.fillStyle='#7A5000';ct.font='bold 10px Arial';ct.textAlign='center';ct.fillText('$',sx,sy+4);ct.textAlign='left';}
    else if(it.type==='bat'){ct.save();ct.translate(sx,sy);ct.rotate(Math.sin(itemT*0.005+it.bob)*0.35);ct.fillStyle='#602080';ct.beginPath();ct.ellipse(0,0,13,8,0,0,Math.PI*2);ct.fill();ct.fillStyle='#8030B0';ct.beginPath();ct.moveTo(-18,3);ct.bezierCurveTo(-22,-9,-8,-14,0,-4);ct.bezierCurveTo(8,-14,22,-9,18,3);ct.closePath();ct.fill();ct.fillStyle='#FF9090';ct.beginPath();ct.ellipse(0,-2,4,5,0,0,Math.PI*2);ct.fill();ct.restore();}
    else if(it.type==='mouse'){drawMouse(ct,sx,sy,itemT+it.bob*1000);}
    else if(it.type==='spring'){ct.fillStyle='#2090D8';ct.beginPath();ct.roundRect(sx-13,sy-11,26,22,6);ct.fill();ct.strokeStyle='#fff';ct.lineWidth=3;ct.lineCap='round';ct.beginPath();ct.moveTo(sx-7,sy+5);ct.lineTo(sx,sy-6);ct.lineTo(sx+7,sy+5);ct.stroke();}
    else if(it.type==='poop'){drawPoop(ct,sx,it.wy);}
  });
}
function burst(wx,wy,col,n,pw){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=pw*Math.random();sparks.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,r:2.5+Math.random()*5,c:col,life:26+Math.random()*20,ml:46});}}
function drawSparks(){sparks=sparks.filter(p=>p.life>0);sparks.forEach(p=>{ct.globalAlpha=(p.life/p.ml)*(p.life/p.ml);ct.fillStyle=p.c;ct.beginPath();ct.arc(p.x-smoothCamX,p.y,p.r,0,Math.PI*2);ct.fill();p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.r*=0.94;p.life--;});ct.globalAlpha=1;}
function setMsg(t){document.getElementById('msg').textContent=t;}
function updHUD(){
  document.getElementById('hc').textContent=coins;document.getElementById('hb').textContent=best+' ft';document.getElementById('hd').textContent=runDist+' ft';
  if(state==='flying'||state==='done'){const rs=Math.hypot(pvx,pvy);displaySpeed+=(rs-displaySpeed)*0.15;const mph=Math.round(displaySpeed*4.2);document.getElementById('spd-pill').style.display='';document.getElementById('hspd').textContent=mph;const t=Math.min(1,mph/180);document.getElementById('hspd').style.color=`rgb(255,${Math.round(255*(1-t*0.85))},${Math.round(255*(1-t))})`;}
  else{document.getElementById('spd-pill').style.display='none';displaySpeed=0;}
}
function updBoosts(){const bar=document.getElementById('boostbar');bar.innerHTML='';for(let i=0;i<boostMax();i++){const d=document.createElement('div');d.className='bp'+(i<boostLeft?' on':'');bar.appendChild(d);}}
function openShop(){
  state='shop';document.getElementById('scoin').textContent='Coins: '+coins;
  const g=document.getElementById('ugrid');g.innerHTML='';
  UPS.forEach(u=>{const maxed=u.val>=u.max,cost=maxed?null:u.costs[u.val],can=!maxed&&coins>=cost;const el=document.createElement('div');el.className='ucard'+(maxed?' maxed':can?' affordable':'');el.innerHTML=`<div class="un">${u.name}</div><div class="ud">${u.desc}</div><div class="uv">${maxed?'✓ Maxed':'Cost: '+cost}</div><div class="ulv">Level ${u.val} / ${u.max}</div>`;el.addEventListener('click',()=>{if(can){coins-=cost;u.val++;openShop();}});g.appendChild(el);});
  document.getElementById('shop').style.display='flex';
}
function closeShop(){document.getElementById('shop').style.display='none';beginRun();}
document.getElementById('goBtn').addEventListener('click',closeShop);
function mkItems(){items=[];for(let i=0;i<140;i++){const wx=600+i*130+Math.random()*70,r=Math.random(),onGnd=r>0.5,wy=onGnd?FL-8:65+Math.random()*(FL-200),type=r<0.30?'coin':r<0.50?'bat':r<0.66?'mouse':r<0.80?'spring':'poop';items.push({wx,wy,type,hit:false,onGnd,bob:Math.random()*Math.PI*2,r2:type==='poop'?14:12});}}
function physics(){
  if(state!=='flying')return;
  pvx+=windX*0.4;px+=pvx;py+=pvy;pvy+=0.31;pvx*=glide();if(Math.abs(pvx)>22)pvx*=0.975;
  const mr=magR(),cr=catR();
  items.forEach(it=>{if(it.hit)return;const dx=px-it.wx,dy=py-it.wy,dist=Math.hypot(dx,dy);if(it.type==='coin'&&dist<mr){it.wx+=(px-it.wx)*0.12;it.wy+=(py-it.wy)*0.12;}if(dist<cr+it.r2){it.hit=true;if(it.type==='coin'){coins++;burst(it.wx,it.wy,'#FFD700',7,3);}else if(it.type==='bat'){pvy-=3.5;burst(it.wx,it.wy,'#9030C0',9,3.5);}else if(it.type==='mouse'){pvx=Math.min(pvx+5,20);pvy-=1.5;burst(it.wx,it.wy,'#FFD840',10,4);burst(it.wx,it.wy,'#C0C0C8',8,3);}else if(it.type==='spring'){pvy=-8;burst(it.wx,it.wy,'#40A0E0',10,4);}else if(it.type==='poop'){pvx*=0.5;pvy+=3;burst(it.wx,it.wy,'#6B4526',8,2);burst(it.wx,it.wy,'#A0A000',6,2.5);}updHUD();}});
  const fl=FL-cr;if(py>=fl){py=fl;onGround=true;if(Math.abs(pvy)>2){pvy=-Math.abs(pvy)*bounceR();pvx*=0.76;burst(px,py,'#70C030',6,2.5);}else pvy=0;}else onGround=false;
  const targetCamX=Math.max(0,px-W*0.3);camX=targetCamX;smoothCamX+=(camX-smoothCamX)*0.08;
  runDist=Math.max(0,Math.round((px-RAMP_BASE_X)/5));checkZone();updHUD();addTrail();
  if(pvx<0.4&&onGround&&Math.abs(pvy)<0.5){state='done';if(runDist>best)best=runDist;coins+=Math.floor(runDist/8);updHUD();setMsg('');showDoneBtn();}
}
function beginRun(){
  state='aim';phase='angle';rampAngle=RAMP_MIN;rampDir=1;powVal=0;powDir=1;sledT=0;sledV=0;
  camX=0;smoothCamX=0;runDist=0;sparks=[];trails=[];blinkT=0;onGround=false;currentZone=0;windX=0;windTarget=0;displaySpeed=0;
  zoneTag.style.opacity='0';hideDoneBtn();curSky=hexToRgb(ZONES[0].sky);curGnd=hexToRgb(ZONES[0].gnd);curHor=hexToRgb(ZONES[0].hor);
  boostLeft=boostMax();mkItems();setMsg('Click To Lock Angle');updBoosts();updHUD();
  if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
}
function doFire(){sledT=0;sledV=0;phase='launching';}
function loop(){
  blinkT++;
  if(state==='aim'){
    if(phase==='angle'){rampAngle+=RAMP_SPEED*rampDir;if(rampAngle>=RAMP_MAX){rampAngle=RAMP_MAX;rampDir=-1;}if(rampAngle<=RAMP_MIN){rampAngle=RAMP_MIN;rampDir=1;}}
    if(phase==='power'){powVal+=POW_SPEED*powDir;if(powVal>=1){powVal=1;powDir=-1;}if(powVal<=0){powVal=0;powDir=1;}}
    if(phase==='launching'){const ms=0.022+powVal*0.018;sledV+=0.0006;if(sledV>ms)sledV=ms;sledT+=sledV;const sp=getSledPos(Math.min(sledT,1.0));if(sledT>0.2)burst(sp.x,sp.y,'#FF8000',2,1.5+sledV*30);if(sledT>=1.0){const tip=getRampTip(),power=maxPow()*(0.3+powVal*0.7);px=tip.x+Math.cos(rampAngle)*20;py=tip.y-Math.sin(rampAngle)*20-catR();pvx=Math.cos(rampAngle)*power;pvy=-Math.sin(rampAngle)*power;state='flying';onGround=false;burst(tip.x,tip.y,'#FFE040',28,8);burst(tip.x,tip.y,'#FF6000',16,6);setMsg('Click To Boost · Space To Ground Smash!');updBoosts();raf=requestAnimationFrame(loop);return;}}
  }
  physics();
  ct.clearRect(0,0,W,H);drawBG();drawGround();
  if(state==='aim'){drawRamp();if(phase==='launching'){const sp=getSledPos(Math.min(sledT,1.0));drawRocketSled(sp.x,sp.y,rampAngle,sledV*30,true);}else{const sp=getSledPos(0.15);drawRocketSled(sp.x,sp.y,rampAngle,phase==='power'?powVal*0.25:0,true);}drawAimUI();}
  drawTrail();drawItems();drawSparks();
  if(state==='flying'||state==='done'){const va=Math.atan2(pvy,pvx);ct.save();ct.translate(px-smoothCamX,py);ct.rotate(va*0.18);drawCat(ct,0,0,catType,catType==='orange'?0.9:0.68,pvx>0.1?1:-1,blinkT%130<4);ct.restore();}
  if(boostFlash>0){ct.globalAlpha=boostFlash/20;ct.fillStyle='#FF8800';ct.fillRect(0,0,W,H);ct.globalAlpha=1;boostFlash--;}
  if(state!=='done'&&state!=='shop'&&state!=='select')raf=requestAnimationFrame(loop);
}
cv.addEventListener('mousedown',()=>{if(state==='aim'&&phase==='angle'){phase='power';powVal=0;powDir=1;setMsg('Release To Ignite!');return;}if(state==='flying'&&boostLeft>0){boostLeft--;pvx+=2.0;pvy-=1.0;boostFlash=10;burst(px,py,'#FF8000',8,3);updBoosts();return;}});
cv.addEventListener('mouseup',()=>{if(state==='aim'&&phase==='power')doFire();});
cv.addEventListener('mouseleave',()=>{if(state==='aim'&&phase==='power')doFire();});
document.addEventListener('keydown',e=>{if(e.code!=='Space')return;e.preventDefault();if(state==='flying'&&onGround){pvy=-13;pvx*=1.05;burst(px,py,'#FFE040',14,5);}});
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state==='aim'&&phase==='angle'){phase='power';powVal=0;powDir=1;setMsg('Release To Ignite!');return;}if(state==='flying'&&boostLeft>0){boostLeft--;pvx+=2.0;pvy-=1.0;boostFlash=10;burst(px,py,'#FF8000',8,3);updBoosts();return;}},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();if(state==='aim'&&phase==='power')doFire();},{passive:false});
</script>
</body>
