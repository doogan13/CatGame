<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;font-family:Arial,sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#wrap{position:relative;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;white-space:nowrap;}
.pill{background:rgba(0,0,0,0.35);color:#fff;border-radius:20px;padding:5px 18px;font-size:13px;white-space:nowrap;}
#msg{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.45);color:#fff;border-radius:20px;padding:6px 24px;font-size:13px;white-space:nowrap;}
#boostbar{position:absolute;top:10px;left:12px;display:flex;gap:6px;}
.bp{width:22px;height:22px;border-radius:5px;background:rgba(127,100,220,0.2);}
.bp.on{background:#8870EE;}
#zonetag{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.35);color:#fff;border-radius:20px;padding:3px 16px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.6s;}
#done-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.6);display:none;flex-direction:column;align-items:center;gap:14px;pointer-events:all;z-index:15;opacity:0;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.25s ease;}
#done-btn.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#done-dist{background:rgba(0,0,0,0.75);color:#FFD700;border-radius:16px;padding:10px 30px;font-size:22px;font-weight:700;white-space:nowrap;}
.done-row{display:flex;gap:12px;}
.done-action{border:2.5px solid #0a2a4a;border-radius:36px;padding:15px 33px;font-size:19px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Arial,sans-serif;transition:filter 0.12s,transform 0.1s;}
.done-action:hover{filter:brightness(1.25);}
.done-action:active{transform:scale(0.95);}
#done-relaunch{background:#1a0e33;color:#C8AAFF;}
#done-swapcat{background:#0a1e2e;color:#80D0FF;}
#done-shop-btn{background:#1a1400;color:#FFD700;font-size:16px;padding:11px 25px;}
#sel{position:absolute;inset:0;background:rgba(255,255,255,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;pointer-events:all;z-index:20;}
#sel h2{font-size:24px;margin:0;color:#222;font-weight:700;}
#sel p{margin:0;color:#666;font-size:15px;}
.crow{display:flex;gap:24px;justify-content:center;}
.ccard{border:2.5px solid #ccc;border-radius:14px;padding:18px 28px;cursor:pointer;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:150px;}
.ccard canvas{display:block;margin:0 auto;}
.ccard:hover{border-color:#8870EE;background:#f0eeff;}
.ccard b{font-size:16px;color:#222;text-align:center;display:block;}
.ccard span{font-size:13px;color:#888;text-align:center;display:block;}
#shop{position:absolute;inset:0;background:rgba(14,8,30,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:all;z-index:20;}
#shop h2{font-size:26px;font-weight:700;color:#fff;margin:0;}
#scoin{font-size:17px;color:#FFD700;font-weight:600;}
.ugrid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:580px;}
.ucard{border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;padding:14px 18px;cursor:pointer;min-width:130px;text-align:center;background:rgba(255,255,255,0.07);}
.ucard:hover{border-color:#FFD700;background:rgba(255,255,255,0.14);}
.ucard .un{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;}
.ucard .ud{font-size:12px;color:rgba(255,255,255,0.55);margin:0 0 8px;}
.ucard .uv{font-size:14px;color:#FFD700;font-weight:600;}
.ucard .ulv{font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;}
.ucard.affordable{border-color:rgba(255,215,0,0.6);}
.ucard.maxed{border-color:rgba(100,255,120,0.4);cursor:default;}
.ucard.maxed .uv{color:#80FF90;}
#goBtn{background:#8870EE;border:none;color:#fff;font-size:18px;font-weight:700;border-radius:12px;padding:14px 48px;cursor:pointer;font-family:Arial,sans-serif;}
#goBtn:hover{background:#AA99FF;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="boostbar"></div>
    <div id="hud">
      <div class="pill">coins: <b id="hc">0</b></div>
      <div class="pill">best: <b id="hb">0 ft</b></div>
      <div class="pill"><b id="hd">0 ft</b></div>
      <div class="pill" id="spd-pill" style="display:none">⚡ <b id="hspd">0</b> mph</div>
    </div>
    <div id="zonetag"></div>
    <div id="msg">Pick Your Cat!</div>
  </div>
  <div id="done-btn">
    <div id="done-dist">0 ft</div>
    <div class="done-row">
      <button class="done-action" id="done-relaunch">🚀 Relaunch!</button>
      <button class="done-action" id="done-swapcat">🐱 Swap Cat</button>
    </div>
    <button class="done-action" id="done-shop-btn">Open Shop</button>
  </div>
  <div id="sel" style="display:flex;">
    <h2 id="sel-title">Choose Your Cat</h2>
    <p>They Fly Very Differently</p>
    <div class="crow">
      <div class="ccard" id="btnTT">
        <canvas id="pvTT" width="120" height="120"></canvas>
        <b>Tater Tot</b><span>Large · Powerful</span>
      </div>
      <div class="ccard" id="btnHF">
        <canvas id="pvHF" width="120" height="120"></canvas>
        <b>Home Fry</b><span>Small · Floaty · Fast</span>
      </div>
    </div>
  </div>
  <div id="shop">
    <h2>Upgrade Shop</h2>
    <div id="scoin">Coins: 0</div>
    <div class="ugrid" id="ugrid"></div>
    <button id="goBtn">Launch!</button>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
